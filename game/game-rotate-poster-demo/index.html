  <style rel="stylesheet" crossorigin>*,*:before,*:after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}:root{--bg: #0d0d1a;--surface: #1a1a2e;--border: rgba(255, 255, 255, .12);--ok: #4caf50;--blue: #1e88e5;--danger: #ef5350;--gold: #ffd54f;--text: #f0f0f0;--text-dim: #888;--radius: 16px}html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;touch-action:none;user-select:none;-webkit-user-select:none}.screen{position:fixed;top:0;right:0;bottom:0;left:0;display:flex;align-items:center;justify-content:center;overflow-y:auto}.hidden{display:none!important}.home-content{display:flex;flex-direction:column;align-items:center;gap:20px;padding:40px 28px;width:100%;max-width:380px;text-align:center}.home-content h1{font-size:clamp(2.4rem,10vw,3.2rem);font-weight:900;letter-spacing:3px;line-height:1.1;background:linear-gradient(135deg,#fff 30%,#aaa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}.text-input{width:100%;padding:14px 18px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:1rem;outline:none;touch-action:auto;user-select:text;-webkit-user-select:text;-webkit-tap-highlight-color:auto;transition:border-color .2s}.text-input:focus{border-color:var(--blue)}.text-input::placeholder{color:var(--text-dim)}.name-row{width:100%}.join-row{display:flex;gap:10px;width:100%}.code-input{flex:1;text-transform:uppercase;letter-spacing:4px;font-weight:700;font-size:1.1rem}.divider{width:100%;display:flex;align-items:center;gap:12px;color:var(--text-dim);font-size:.85rem}.divider:before,.divider:after{content:"";flex:1;height:1px;background:var(--border)}.error-msg{color:var(--danger);font-size:.85rem;min-height:1.2em;text-align:center}.btn-primary{width:100%;background:var(--ok);color:#fff;border:none;padding:16px;font-size:1rem;font-weight:700;letter-spacing:2p <body>

  <!-- ── Home Screen ── -->
  <div id="home-screen" class="screen">
    <div class="home-content">
      <h1>ROTATE<br>POSTER</h1>

      <div class="name-row">
        <input id="name-input" class="text-input" type="text"
               placeholder="Your name (optional)" maxlength="12" autocomplete="off">
      </div>

      <button id="btn-join" class="btn-primary">START GAME</button>
    </div>
  </div>

  <!-- ── Game Screen ── -->
  <div id="game-screen" class="screen hidden">
    <header id="game-header">
      <div id="progress">1 / 10</div>
      <div id="timer">01:00</div>
    </header>

    <main id="game-main">
      <div id="poster-container">
        <div id="poster-wrapper">
          <div id="poster-frame">
            <img id="poster-img" src="" alt="poster" draggable="false">
          </div>
        </div>
        <div id="cross-overlay">✗</div>
        <div id="tick-overlay">✓</div>
      </div>
    </main>

    <footer id="game-footer">
      <button id="btn-ccw"  class="ctrl-btn"          aria-label="Rotate anti-clockwise">↺</button>
      <button id="btn-ok"   class="ctrl-btn ok-btn"   aria-label="Confirm">✓</button>
      <button id="btn-cw"   class="ctrl-btn"          aria-label="Rotate clockwise">↻</button>
    </footer>
  </div>

  <!-- ── Result Screen ── -->
  <div id="result-screen" class="screen hidden">
    <div class="result-content">
      <h1 id="result-title">Results</h1>
      <div id="result-list" class="result-list"></div>
      <button id="btn-play-again" class="btn-primary">PLAY AGAIN</button>
    </div>
  </div>

</body>
</html>
